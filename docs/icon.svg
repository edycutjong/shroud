<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>
    
    <!-- Emerald metallic gradient -->
    <linearGradient id="shieldBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Glowing green neon gradient -->
    <linearGradient id="neonGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="laserGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>

    <!-- Advanced Glow Filters -->
    <filter id="epicGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes rotateHUD {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes rotateHUDRev {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    @keyframes pulseGlow {
      0% { opacity: 0.25; }
      50% { opacity: 0.55; }
      100% { opacity: 0.25; }
    }

    @keyframes liquidFlow {
      0%, 100% { transform: scale(1) translateY(0px); }
      50% { transform: scale(1.08) translateY(-4px); }
    }

    .floater {
      animation: float 6s ease-in-out infinite;
    }

    .liquid {
      animation: liquidFlow 4s ease-in-out infinite;
      transform-origin: 256px 250px;
    }

    .hud-ring-1 {
      animation: rotateHUD 25s linear infinite;
      transform-origin: 256px 256px;
    }

    .hud-ring-2 {
      animation: rotateHUDRev 15s linear infinite;
      transform-origin: 256px 256px;
    }

    .ambient-glow {
      animation: pulseGlow 4s ease-in-out infinite;
    }
  </style>

  <!-- Base Cyber Background -->
  <rect width="512" height="512" rx="90" fill="url(#bgGrad)"/>
  
  <!-- Outer Cyber Border -->
  <rect width="504" height="504" x="4" y="4" rx="86" fill="none" stroke="#1e293b" stroke-width="3"/>
  <rect width="504" height="504" x="4" y="4" rx="86" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4" filter="url(#epicGlow)"/>

  <!-- Ambient Light Pulse -->
  <circle cx="256" cy="256" r="180" fill="#10b981" opacity="0.3" filter="url(#epicGlow)" class="ambient-glow"/>

  <!-- HUD Rotator 1 -->
  <g class="hud-ring-1" opacity="0.25">
    <circle cx="256" cy="256" r="220" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="100 40 20 40 80 50"/>
    <circle cx="256" cy="256" r="200" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="10 15 30 10"/>
    <path d="M 256,16 L 256,36 M 256,476 L 256,496 M 16,256 L 36,256 M 476,256 L 496,256" stroke="#10b981" stroke-width="3"/>
  </g>

  <!-- HUD Rotator 2 -->
  <g class="hud-ring-2" opacity="0.3">
    <circle cx="256" cy="256" r="170" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="50 150 10 30"/>
    <circle cx="256" cy="256" r="160" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="5 10 20 40"/>
  </g>

  <!-- Floating Main Composition -->
  <g class="floater">
    <!-- Outer Shield Frame (Enlarged and Perfectly Centered) -->
    <path d="M126,100 Q256,50 386,100 L386,300 Q256,460 126,300 Z" fill="none" stroke="url(#shieldBody)" stroke-width="24" stroke-linejoin="round" filter="url(#epicGlow)"/>
    <path d="M126,100 Q256,50 386,100 L386,300 Q256,460 126,300 Z" fill="#0f172a" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>

    <!-- Concentric privacy rings inside shield (Centered at 256, 250) -->
    <g class="hud-ring-1" opacity="0.3" transform-origin="256px 250px">
      <circle cx="256" cy="250" r="90" fill="none" stroke="#10b981" stroke-width="4" stroke-dasharray="40 20 60 30"/>
    </g>
    <g class="hud-ring-2" opacity="0.4" transform-origin="256px 250px">
      <circle cx="256" cy="250" r="65" fill="none" stroke="#34d399" stroke-width="3" stroke-dasharray="20 40 10 30"/>
    </g>

    <!-- Floating Privacy Droplet in Center (Liquid: Scaled Up and Centered at 256, 250) -->
    <path d="M256,160 C256,160 206,205 206,250 C206,278 228,300 256,300 C284,300 306,278 306,250 C306,205 256,160 256,160 Z" fill="url(#shieldBody)" filter="url(#epicGlow)" class="liquid"/>
    <path d="M256,160 C256,160 206,205 206,250 C206,278 228,300 256,300 C284,300 306,278 306,250 C306,205 256,160 256,160 Z" fill="none" stroke="#ffffff" stroke-width="2" class="liquid"/>

    <!-- Small lock symbol over droplet -->
    <g transform="translate(241, 245)">
      <rect x="0" y="10" width="30" height="22" rx="4" fill="#0f172a" stroke="#ffffff" stroke-width="2"/>
      <path d="M5,10 L5,0 A10,10 0 0,1 25,0 L25,10" fill="none" stroke="#ffffff" stroke-width="2"/>
    </g>
  </g>
</svg>