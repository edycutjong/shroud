name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Code Quality ─────────────────────────────────
  frontend-quality:
    name: "Stage 1 · Frontend Quality"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ github.event_name == 'push' && fromJSON('[22, 24]') || fromJSON('[22]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Format check (Prettier)
        run: npm run format:check
      - name: Lint check
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Unit tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  contracts-quality:
    name: "Stage 1 · Contracts Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run Cargo Tests
        run: cargo test

  # ── STAGE 2: Security Gate ────────────────────────────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── STAGE 3: Build Verification ───────────────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [frontend-quality, contracts-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Next.js production build
        run: npm run build
      - name: Check bundle size
        run: |
          echo "📦 Bundle Size Report"
          echo "─────────────────────"
          if [ -d ".next" ]; then
            TOTAL_SIZE=$(du -sk .next/static | cut -f1)
            echo "Total static assets: ${TOTAL_SIZE}KB"
            if [ "$TOTAL_SIZE" -gt 2000 ]; then
              echo "::error::Bundle size ${TOTAL_SIZE}KB exceeds 2000KB error threshold"
              exit 1
            elif [ "$TOTAL_SIZE" -gt 1500 ]; then
              echo "::warning::Bundle size ${TOTAL_SIZE}KB exceeds 1500KB warning threshold"
            else
              echo "✅ Bundle size within budget"
            fi
          fi

  # ── STAGE 4: E2E Tests ────────────────────────────────────
  e2e:
    name: "Stage 4 · E2E Tests"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build application
        run: npm run build
      - name: Run E2E tests
        run: npm run e2e
        env:
          NODE_ENV: production
      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ── STAGE 5: Performance ──────────────────────────────────
  performance:
    name: "Stage 5 · Performance"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        continue-on-error: true

  # ── STAGE 6: Release & Deploy (main only) ─────────────────
  deploy:
    name: "Stage 6 · Release & Deploy"
    needs: [build, e2e, performance, secret-scan, dependency-audit, contracts-quality]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run version bump
        run: npx tsx scripts/release-bump.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
